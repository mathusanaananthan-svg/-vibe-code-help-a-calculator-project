<!doctype html>
<html lang="en">

<head>
    <title>Calculator App</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <h2 class="heading">calculator</h2>
    </header>
    <main class="d-flex justify-content-center align-items-center vh-100">
        <div class="calculator card p-3">
            <input type="text" id="display" class="form-control mb-2 text-end" readonly />
            <div class="btn-group d-flex flex-wrap">
                <!-- digit buttons -->


                <button class="btn btn-light m-1 calc-btn" data-value="1">1</button>
                <button class="btn btn-light m-1 calc-btn" data-value="2">2</button>
                <button class="btn btn-light m-1 calc-btn" data-value="3">3</button>
                <button class="btn btn-light m-1 calc-btn" data-value="4">4</button>
                <button class="btn btn-light m-1 calc-btn" data-value="5">5</button>
                <button class="btn btn-light m-1 calc-btn" data-value="6">6</button>
                <button class="btn btn-light m-1 calc-btn" data-value="7">7</button>
                <button class="btn btn-light m-1 calc-btn" data-value="8">8</button>
                <button class="btn btn-light m-1 calc-btn" data-value="0">0</button>
                <button class="btn btn-light m-1 calc-btn" data-value=".">.</button>
                <!-- operator buttons -->
                <button class="btn btn-primary m-1 calc-btn" data-value="+">+</button>
                <button class="btn btn-primary m-1 calc-btn" data-value="*">×</button>
                <button class="btn btn-primary m-1 calc-btn" data-value="-">−</button>
                <button class="btn btn-primary m-1 calc-btn" data-value="/">÷</button>
                <button class="btn btn-success m-1 calc-btn" data-value="=">=</button>
                <button class="btn btn-danger m-1" id="clear">C</button>

            </div>
        </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <!-- Calculator script -->
    <script src="app.js"></script>
</body>

</html>
